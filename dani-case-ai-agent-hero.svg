<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'Courier New', monospace; }
    </style>
  </defs>

  <rect width="600" height="800" fill="#0a0a0a"/>

  <!-- Outer rings -->
  <circle cx="300" cy="380" r="110" fill="none" stroke="#1f1f1f" stroke-width="1"/>
  <circle cx="300" cy="380" r="70" fill="none" stroke="#2a2a2a" stroke-width="1"/>

  <!-- Center node -->
  <circle cx="300" cy="380" r="26" fill="#ffffff"/>
  <text x="300" y="384" text-anchor="middle" fill="#0a0a0a" font-size="8" letter-spacing="1.5" font-weight="500">AGENT</text>

  <!-- Primary orbiting nodes -->
  <circle cx="300" cy="270" r="8" fill="#ffffff"/>
  <circle cx="402" cy="438" r="8" fill="#ffffff"/>
  <circle cx="198" cy="438" r="8" fill="#ffffff"/>

  <!-- Connector lines -->
  <line x1="300" y1="354" x2="300" y2="278" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="322" y1="398" x2="394" y2="430" stroke="#ffffff" stroke-width="1.2"/>
  <line x1="278" y1="398" x2="206" y2="430" stroke="#ffffff" stroke-width="1.2"/>

  <!-- Outer nodes (faint) -->
  <circle cx="300" cy="180" r="5" fill="none" stroke="#4c4c4c" stroke-width="1"/>
  <circle cx="480" cy="480" r="5" fill="none" stroke="#4c4c4c" stroke-width="1"/>
  <circle cx="120" cy="480" r="5" fill="none" stroke="#4c4c4c" stroke-width="1"/>

  <!-- Dashed outer lines -->
  <line x1="300" y1="278" x2="300" y2="185" stroke="#4c4c4c" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="402" y1="446" x2="475" y2="475" stroke="#4c4c4c" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="198" y1="446" x2="125" y2="475" stroke="#4c4c4c" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- Node labels -->
  <text x="300" y="254" text-anchor="middle" fill="#8c8c8c" font-size="7" letter-spacing="1.2">USER CONTEXT</text>
  <text x="418" y="432" text-anchor="start" fill="#8c8c8c" font-size="7" letter-spacing="1.2">ACTIONS</text>
  <text x="182" y="432" text-anchor="end" fill="#8c8c8c" font-size="7" letter-spacing="1.2">INSIGHTS</text>

  <!-- Corner labels -->
  <text x="36" y="60" fill="#5c5c5c" font-size="11" letter-spacing="2">AI AGENT</text>
  <text x="564" y="60" text-anchor="end" fill="#5c5c5c" font-size="11" letter-spacing="2">A &#8212; 7</text>
</svg>
